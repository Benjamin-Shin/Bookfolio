name: seogadam_mobile
description: 서가담(Seogadam) — 개인 서가 Flutter 앱. 패키지 식별자 seogadam_mobile 유지.
publish_to: "none"
version: 1.0.4+4

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.17
  google_fonts: ^6.2.1
  google_sign_in: ^6.3.0
  http: ^1.3.0
  http_parser: ^4.1.2
  flutter_markdown: ^0.7.4+1
  table_calendar: ^3.1.2
  intl: ^0.20.2
  speech_to_text: ^7.0.0
  mobile_scanner: ^6.0.2
  provider: ^6.1.2
  shared_preferences: ^2.5.2
  flutter_secure_storage: ^9.2.4
  url_launcher: ^6.3.1
  image_picker: ^1.2.1
  google_mlkit_text_recognition: ^0.15.1
  connectivity_plus: ^6.1.4
  drift: ^2.32.1
  path_provider: ^2.1.5
  path: ^1.9.1
  kakao_flutter_sdk_user: ^2.0.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  drift_dev: ^2.32.1
  build_runner: ^2.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/brand/app_icon.png
  remove_alpha_ios: true
  background_color_ios: "#ffffff"

flutter:
  uses-material-design: true
  assets:
    - assets/Google.svg
    - assets/kakao_login_medium_narrow.png
    - assets/google_signup_light_sq_su.png
    - assets/brand/Seogadam_Web_logo.png
    - assets/brand/bookfolio_logo.svg
    - assets/brand/600_Login_Back.png
    - assets/legal/
    - assets/reading-type/
