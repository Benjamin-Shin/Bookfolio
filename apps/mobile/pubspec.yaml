name: bookfolio_mobile
description: Bookfolio Flutter mobile app for personal library management.
publish_to: "none"
version: 1.0.0+11

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.17
  google_sign_in: ^6.3.0
  http: ^1.3.0
  flutter_markdown: ^0.7.4+1
  table_calendar: ^3.1.2
  mobile_scanner: ^6.0.2
  provider: ^6.1.2
  shared_preferences: ^2.5.2
  url_launcher: ^6.3.1
  image_picker: ^1.2.1
  google_mlkit_text_recognition: ^0.15.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/brand/app_icon.png
  remove_alpha_ios: true
  background_color_ios: "#ffffff"

flutter:
  uses-material-design: true
  assets:
    - assets/brand/bookfolio_logo.svg
